rules:
  - id: devsecwatch-aws-access-key
    patterns:
      - pattern-regex: (A3T[A-Z0-9]|AKIA|AGPA|AIDA|AROA|AIPA|ANPA|ANVA|ASIA)[A-Z0-9]{16}
    message: "Potential AWS Access Key ID detected. Exposure can lead to unauthorized cloud resource access."
    languages: [regex]
    severity: ERROR
    metadata:
      category: security
      confidence: HIGH

  - id: devsecwatch-github-pat
    patterns:
      - pattern-regex: (ghp|gho|ghu|ghs|ghr)_[a-zA-Z0-9]{36}
    message: "Potential GitHub Personal Access Token detected. Exposure allows unauthorized repository access."
    languages: [regex]
    severity: ERROR
    metadata:
      category: security
      confidence: HIGH

  - id: devsecwatch-slack-webhook
    patterns:
      - pattern-regex: https://hooks\.slack\.com/services/T[a-zA-Z0-9_]{8}/B[a-zA-Z0-9_]{8}/[a-zA-Z0-9_]{24}
    message: "Potential Slack Incoming Webhook detected. Exposure allows unauthenticated posting to Slack channels."
    languages: [regex]
    severity: ERROR
    metadata:
      category: security
      confidence: HIGH
