name: Build & Test

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]

jobs:

  # ─────────────────────────────────────────────────────────
  # Build & Test Backend API
  # ─────────────────────────────────────────────────────────
  build-backend:
    name: Build Backend API
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend-api

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven (skip tests)
        run: mvn clean package -DskipTests -q

      - name: Upload Backend JAR
        uses: actions/upload-artifact@v4
        with:
          name: backend-api-jar
          path: backend-api/target/backend-api-0.0.1-SNAPSHOT.jar

  # ─────────────────────────────────────────────────────────
  # Build & Test Worker Service
  # ─────────────────────────────────────────────────────────
  build-worker:
    name: Build Worker Service
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: worker-service

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven (skip tests)
        run: mvn clean package -DskipTests -q

  # ─────────────────────────────────────────────────────────
  # Build & Lint Frontend
  # ─────────────────────────────────────────────────────────
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: devsecwatch-frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: devsecwatch-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_API_URL: https://placeholder.railway.app

  # ─────────────────────────────────────────────────────────
  # Validate AI Service
  # ─────────────────────────────────────────────────────────
  validate-ai-service:
    name: Validate AI Service
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ai-service

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Syntax check
        run: python -m py_compile app/main.py app/config.py app/models.py

  # ─────────────────────────────────────────────────────────
  # Docker Build Validation
  # ─────────────────────────────────────────────────────────
  docker-build-check:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: [build-backend, build-worker, build-frontend, validate-ai-service]
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Build Backend Docker image
        run: docker build -t devsecwatch-backend:ci ./backend-api

      - name: Build Worker Docker image
        run: docker build -t devsecwatch-worker:ci ./worker-service

      - name: Build AI Service Docker image
        run: docker build -t devsecwatch-ai:ci ./ai-service
