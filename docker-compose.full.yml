version: '3.8'

# ============================================================
# DevSecWatch — Full Production Stack (All Services)
# ============================================================
# Usage: docker-compose -f docker-compose.full.yml up -d
# ============================================================

services:

  # ── Infrastructure ────────────────────────────────────────

  postgres:
    image: postgres:15-alpine
    container_name: devsecwatch-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: devsecwatch
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: devsecwatch-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: devsecwatch-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Application Services ──────────────────────────────────

  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: devsecwatch-ai
    restart: unless-stopped
    env_file:
      - ./ai-service/.env
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  backend-api:
    build:
      context: ./backend-api
      dockerfile: Dockerfile
    container_name: devsecwatch-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: jdbc:postgresql://postgres:5432/devsecwatch
      DATABASE_USERNAME: postgres
      DATABASE_PASSWORD: postgres
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: guest
      RABBITMQ_PASSWORD: guest
      RABBITMQ_VHOST: /
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET:-changeme-use-a-strong-secret-in-production-64chars}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-dummy_id}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-dummy_secret}
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  worker-service:
    build:
      context: ./worker-service
      dockerfile: Dockerfile
    container_name: devsecwatch-worker
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
      ai-service:
        condition: service_healthy
    environment:
      DATABASE_URL: jdbc:postgresql://postgres:5432/devsecwatch
      DATABASE_USERNAME: postgres
      DATABASE_PASSWORD: postgres
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: guest
      RABBITMQ_PASSWORD: guest
      RABBITMQ_VHOST: /
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      AI_SERVICE_URL: http://ai-service:8000
      APP_TEMP_DIRECTORY: /tmp/devsecwatch

volumes:
  postgres_data:
